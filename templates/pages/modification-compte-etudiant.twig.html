{% extends "base.twig.html" %}

{% block title %}Mes informations – Web4All{% endblock %}

{% block content %}
<main class="page-wrapper">


  <section aria-labelledby="update-title">

    <h1 id="update-title" class="title fade-in">Mes informations</h1>

    <form id="updateForm" class="update-form" novalidate>

      <div class="field fade-in" style="animation-delay:.1s">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" placeholder="Nom" value="Diemunsch" required />
      </div>

      <div class="field fade-in" style="animation-delay:.15s">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" placeholder="Prénom" value="Nicolas" required />
      </div>

      <div class="field fade-in" style="animation-delay:.2s">
        <label for="email">Adresse mail</label>
        <input type="email" id="email" name="email" placeholder="contact@exemple.com" value="nicolas.diemunsch@gmail.com" required />
      </div>

      <div class="field fade-in" style="animation-delay:.25s">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••••••" value="••••••••••••" />
      </div>

      <div class="actions fade-in" style="animation-delay:.30s">
        <button type="submit" class="btn btn-primary">Mettre à jour</button>
      </div>

    </form>

  </section>


</main>

{% block scripts %}
<script>
    document.getElementById('updateForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const required = this.querySelectorAll('[required]');
        let valid = true;
        required.forEach(el => {
            el.style.borderColor = '';
            if (!el.value.trim()) {
                el.style.borderColor = 'var(--error)';
                valid = false;
            }
        });
        if (valid) window.location.href = '?page=modification-compte-validation&type=etudiant';
    });
</script>
{% endblock %}

{% endblock %}
