<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer une offre – Web4All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">Web4All</span>
    <div class="burger" aria-label="Menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="page-wrapper">

    <h1 class="page-title">Créer une offre</h1>

    <form id="offerForm" novalidate>

      <!-- SECTION : Informations générales -->
      <section class="form-section">
        <h2 class="section-title">Informations générales</h2>
        <div class="fields-grid">

          <div class="field">
            <label for="nom">Nom de l'offre <span class="required">*</span></label>
            <input type="text" id="nom" name="nom" required />
          </div>

          <div class="field">
            <label for="description">Description de l'offre <span class="required">*</span></label>
            <textarea id="description" name="description" rows="5" required></textarea>
          </div>

          <div class="field">
            <label for="duree">Durée de la mission (jours) <span class="required">*</span></label>
            <input type="number" id="duree" name="duree" min="1" required />
          </div>

          <div class="field">
            <label for="type">Type de contrat <span class="required">*</span></label>
            <div class="select-wrapper">
              <select id="type" name="type" required>
                <option value="" disabled selected>-- Sélectionnez --</option>
                <option>Stage</option>
                <option>Alternance</option>
                <option>CDD</option>
                <option>CDI</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="competences">Domaine de compétences <span class="required">*</span></label>
            <div class="select-wrapper">
              <select id="competences" name="competences" required>
                <option value="" disabled selected>-- Sélectionnez --</option>
                <option>Développement web</option>
                <option>Data / IA</option>
                <option>Cybersécurité</option>
                <option>Réseau &amp; Systèmes</option>
                <option>Marketing digital</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="niveau">Niveau d'études requis <span class="required">*</span></label>
            <div class="select-wrapper">
              <select id="niveau" name="niveau" required>
                <option value="" disabled selected>-- Sélectionnez --</option>
                <option>Bac</option>
                <option>Bac +2</option>
                <option>Bac +3</option>
                <option>Bac +4</option>
                <option>Bac +5</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="localisation">Localisation (ville) <span class="required">*</span></label>
            <input type="text" id="localisation" name="localisation" required />
          </div>

          <div class="field">
            <label for="remuneration">Rémunération (taux horaire) <span class="required">*</span></label>
            <input type="number" id="remuneration" name="remuneration" min="0" step="0.01" required />
          </div>

        </div>
      </section>

      <!-- CONSENTEMENTS -->
      <div class="consent-block">
        <input type="checkbox" id="consent" name="consent" required />
        <p>
          J'accepte les CGU et déclare avoir pris connaissance de la
          <a href="#">politique de protection des données</a> du site web4all.com.
        </p>
      </div>

      <!-- ACTIONS -->
      <div class="actions">
        <button type="submit" class="btn btn-primary">Créer l'offre</button>
        <button type="button" class="btn btn-outline-primary" onclick="history.back()">Annuler</button>
      </div>

    </form>
  </div>

  <script>
    // Burger menu toggle
    const burger = document.querySelector('.burger');
    burger.addEventListener('click', () => {
      const spans = burger.querySelectorAll('span');
      burger.classList.toggle('open');
      if (burger.classList.contains('open')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
      } else {
        spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
      }
    });

    // Validation basique front
    document.getElementById('offerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const required = this.querySelectorAll('[required]');
      let valid = true;
      required.forEach(el => {
        el.style.borderColor = '';
        if (!el.value || (el.type === 'checkbox' && !el.checked)) {
          el.style.borderColor = 'var(--error)';
          valid = false;
        }
      });
      if (valid) alert('Offre créée avec succès !');
    });
  </script>

</body>
</html>
