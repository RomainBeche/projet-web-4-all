<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Web4All{% endblock %}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body>
    {{ include('components/navbar.twig.html') }}

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        const navLinks = document.querySelector(".nav-links");
        const navbar = document.querySelector(".navbar");
        document.querySelector("#nav-toggle").addEventListener("click", function () {
            this.classList.toggle("active");
            navLinks.classList.toggle("mobile-menu");
            navbar.classList.toggle("menu-open");
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
