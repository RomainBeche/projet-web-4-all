{% extends "base.twig.html" %}

{% block title %}Créer une entreprise – Web4All{% endblock %}

{% block content %}
<main class="page-wrapper">

    
    <h1 class="title create-offer-header fade-in">Créer une entreprise</h1>

    {% if error %}<p style="color:red"> {{ error }}</p>{% endif %}
    {% if succes %}<p style="color:green"> {{ succes }}</p>{% endif %}


    <form method="POST" action="/?page=creation-entreprise" class="register-form">
        <div class="fields-grid fade-in">
            <div class="field">
                <label for="nom">Nom *</label>
                <input type="text" id="nom" name="nom" required />
            </div>
            <div class="field">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required />
            </div>
            <div class="field">
                <label for="telephone">Téléphone</label>
                <input type="text" id="telephone" name="telephone" />
            </div>
            <div class="field">
                <label for="secteur">Secteur *</label>
                <input type="text" id="secteur" name="secteur" required />
            </div>
            <div class="field">
                <label for="numero_rue">Numéro de rue</label>
                <input type="text" id="numero_rue" name="numero_rue" />
            </div>
            <div class="field">
                <label for="nom_rue">Rue *</label>
                <input type="text" id="nom_rue" name="nom_rue" required />
            </div>
            <div class="field">
                <label for="nom_ville">Ville *</label>
                <input type="text" id="nom_ville" name="nom_ville" required />
            </div>
            <div class="field">
                <label for="code_postal">Code postal</label>
                <input type="text" id="code_postal" name="code_postal" />
            </div>
            <div class="field" style="grid-column: span 2">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>
        </div>
        <div class="actions fade-in">
            <button type="submit" class="btn btn-primary">Créer</button>
            <a href="?page=entreprises-gestion" class="btn btn-secondary">Annuler</a>
        </div>
    </form>


</main>
{% endblock %}
