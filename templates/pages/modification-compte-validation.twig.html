{% extends "base.twig.html" %}

{% block title %}Informations mises à jour – Web4All{% endblock %}

{% block content %}
<div class="page-wrapper">
  <h1 class="page-title fade-in">Informations mises à jour !</h1>
  <p id="validation-message" class="delete-success fade-in">Vos informations ont bien été enregistrées.</p>
  <div class="actions fade-in" style="animation-delay:.2s">
    <a id="back-link" href="#" class="btn btn-primary">Retour à mon compte</a>
  </div>
</div>
  
<script>
  // Détection du type de compte via l'URL (?type=etudiant / pilote / entreprise)
  const params = new URLSearchParams(window.location.search);
  const type = params.get('type');
  const config = {
    etudiant:   { label: 'etudiant',   href: '?page=compte-etudiant' },
    pilote:     { label: 'pilote',      href: '?page=compte-pilote' },
    entreprise: { label: 'entreprise',  href: '?page=compte-entreprise' },
  };
  const match = config[type] || { label: '', href: '#' };
  document.getElementById('validation-message').textContent =
    `Vos informations${match.label ? ' (' + match.label + ')' : ''} ont bien été enregistrées.`;
  document.getElementById('back-link').href = match.href;
</script>
{% endblock %}
