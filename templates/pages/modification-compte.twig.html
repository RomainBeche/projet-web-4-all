{% extends "base.twig.html" %}
{% block title %}Mes informations – Web4All{% endblock %}
{% block content %}
<main class="page-wrapper">
  <section aria-labelledby="update-title">
    <h1 id="update-title" class="title fade-in">Mes informations</h1>
    <form id="updateForm" class="update-form" novalidate>
      <div class="field fade-in" style="animation-delay:.1s">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" placeholder="Nom" value="{{ user_nom }}" required />
      </div>
      <div class="field fade-in" style="animation-delay:.15s">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" placeholder="Prénom" value="{{ user_prenom }}" required />
      </div>
      <div class="field fade-in" style="animation-delay:.2s">
        <label for="email">
          {% if user_role == 'pilote' %}Adresse mail professionnelle{% else %}Adresse mail{% endif %}
        </label>
        <input type="email" id="email" name="email" placeholder="contact@exemple.com" value="{{ user_email }}" required />
      </div>
      <div class="field fade-in" style="animation-delay:.25s">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••••••" />
      </div>
      <div class="actions fade-in" style="animation-delay:.30s">
        <button type="submit" class="btn btn-primary">Mettre à jour</button>
      </div>
    </form>
  </section>
</main>
{% block scripts %}
<script>
    document.getElementById('updateForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const required = this.querySelectorAll('[required]');
        let valid = true;
        required.forEach(el => {
            el.style.borderColor = '';
            if (!el.value.trim()) {
                el.style.borderColor = 'var(--error)';
                valid = false;
            }
        });
        if (valid) window.location.href = '?page=modification-compte-validation&type={{ user_role }}';
    });
</script>
{% endblock %}
{% endblock %}
